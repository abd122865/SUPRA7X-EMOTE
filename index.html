  <style>
    * { font-family: 'Segoe UI', 'Tajawal', 'Poppins', sans-serif; }
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(-45deg, #0a0f1e, #141a2b, #1e1a2e, #2a1a2e);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: #f1f5f9;
    }
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .glass {
      background: rgba(10, 15, 30, 0.55);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(212, 175, 55, 0.3);
      box-shadow: 0 20px 40px -12px rgba(0,0,0,0.7), 0 0 30px rgba(212, 175, 55, 0.1);
    }
    .gold-glow {
      text-shadow: 0 0 15px #d4af37, 0 0 30px #b8860b;
    }
    .emote-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 10px;
      max-height: 420px;
      overflow-y: auto;
      padding: 8px;
      scrollbar-width: thin;
      scrollbar-color: #d4af37 #1e293b;
    }
    .emote-item {
      background: rgba(30, 20, 50, 0.6);
      border-radius: 20px;
      padding: 8px;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid transparent;
      backdrop-filter: blur(4px);
    }
    .emote-item:hover {
      border-color: #d4af37;
      background: rgba(80, 40, 100, 0.7);
      transform: scale(1.02);
      box-shadow: 0 0 25px #d4af3740;
    }
    .emote-item img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: contain;
      border-radius: 16px;
      background: #0b0e1a;
    }
    .emote-item .fallback-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      aspect-ratio: 1/1;
      background: #1a1f35;
      border-radius: 16px;
      color: #d4af37;
      font-size: 28px;
    }
    .uid-badge {
      background: #1e2a4a;
      border: 1px solid #d4af3760;
      border-radius: 40px;
      padding: 6px 18px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin: 5px;
      font-weight: 500;
      color: #f0e6d2;
      box-shadow: 0 4px 8px #00000030;
    }
    .btn-primary {
      background: linear-gradient(145deg, #d4af37, #b8860b);
      color: #0a0e1a;
      font-weight: bold;
      border: none;
      transition: all 0.2s;
      box-shadow: 0 8px 20px -5px #d4af3750;
    }
    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 25px -6px #d4af37;
      background: linear-gradient(145deg, #e6c14a, #c9a020);
    }
    .btn-secondary {
      background: rgba(20, 30, 50, 0.6);
      border: 1px solid #8b7a5a;
      color: #f1e9d8;
      backdrop-filter: blur(8px);
    }
    .btn-secondary:hover { background: rgba(60, 40, 80, 0.7); border-color: #d4af37; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1a1f35; border-radius: 12px; }
    ::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 12px; }
    [dir="rtl"] { text-align: right; }
    [dir="ltr"] { text-align: left; }
  </style>

    }

    async function executeEmote(emoteId) {
      const t = translations[currentLang];
      const teamCode = teamCodeInput.value.trim();
      const uids = Array.from(uidsList);
      if (!canExecute()) {
        showAlert(t.alertFill, 'error');
        return;
      }
      emoteGrid.style.pointerEvents = 'none';
      showAlert(`${t.executing} ${emoteId}...`, 'info');
      try {
        const params = new URLSearchParams();
        params.append('team', teamCode);
        uids.forEach(uid => params.append('uid', uid));
        params.append('emote', emoteId);
        const url = `${API_BASE}/emote?${params.toString()}`;
        const response = await fetch(url);
        const data = await response.json();
        if (response.ok && data.success) {
          showAlert(t.successEmote, 'success');
        } else {
          throw new Error(data.error || 'Request failed');
        }
      } catch (err) {
        console.error('Emote error:', err);
        showAlert(`❌ ${err.message}`, 'error');
      } finally {
        emoteGrid.style.pointerEvents = '';
      }
    }

    function renderEmotes(filterText = '') {
      const filterLower = filterText.toLowerCase();
      const filtered = emoteIds.filter(id => id.includes(filterText));
      emoteGrid.innerHTML = '';
      filtered.forEach(id => {
        const div = document.createElement('div');
        div.className = 'emote-item';
        div.setAttribute('data-id', id);
        
        const img = new Image();
        img.alt = id;
        img.loading = 'lazy';
        img.crossOrigin = 'anonymous';
        img.src = CDN_BASE + id + '.png';
        
        img.onerror = function() {
          const parent = this.parentNode;
          if (parent) {
            const fallback = document.createElement('div');
            fallback.className = 'fallback-icon';
            fallback.innerHTML = '<i class="fas fa-image"></i>';
            parent.appendChild(fallback);
          }
          this.remove();
        };
        
        div.addEventListener('click', () => executeEmote(id));
        div.appendChild(img);
        emoteGrid.appendChild(div);
      });
    }

    async function sendSquad5() {
      const t = translations[currentLang];
      const uid = squadUidInput.value.trim();
      if (!uid || !/^\d+$/.test(uid)) return showAlert(t.errorUid, 'error');
      sendSquadBtn.disabled = true;
      sendSquadBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
      try {
        const url = `${API_BASE}/squad5?uid=${uid}`;
        const response = await fetch(url);
        const data = await response.json();
        if (response.ok && data.success) {
          showAlert(`${t.successSquad} ${uid}`, 'success');
        } else {
          throw new Error(data.error || 'Failed');
        }
      } catch (err) {
        showAlert(`Error: ${err.message}`, 'error');
      } finally {
        sendSquadBtn.disabled = false;
        sendSquadBtn.innerHTML = '<i class="fas fa-paper-plane"></i>';
      }
    }

    async function checkApiStatus() {
      const t = translations[currentLang];
      try {
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), 3000);
        await fetch(`${API_BASE}/squad5?uid=123`, { method: 'HEAD', signal: controller.signal });
        clearTimeout(id);
        if (apiStatusSpan) {
          apiStatusSpan.innerHTML = t.online;
          apiStatusSpan.className = 'text-green-400';
        }
      } catch (e) {
        if (apiStatusSpan) {
          apiStatusSpan.innerHTML = t.offline;
          apiStatusSpan.className = 'text-red-400';
        }
      }
    }

    addUidBtn.addEventListener('click', () => addUid(uidInput.value));
    uidInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') addUid(uidInput.value); });
    emoteSearch.addEventListener('input', (e) => renderEmotes(e.target.value));
    sendSquadBtn.addEventListener('click', sendSquad5);

    function init() {
      applyLanguage(currentLang);
      renderEmotes();
      updateUidDisplay();
      checkApiStatus();
      setInterval(checkApiStatus, 30000);
    }
    init();
  })();
</script>
</body>
</html>
