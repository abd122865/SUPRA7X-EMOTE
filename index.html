    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg-deep);
      color: #e8dfc8;
      font-family: 'Tajawal', sans-serif;
      overflow-x: hidden;
      position: relative;
    }
    /* خلفية الجزيئات تكون خلف كل شيء */
    #tsparticles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }
    /* التأثيرات الثابتة السابقة نجعلها شفافة أكثر لتبرز الجزيئات */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:

        radial-gradient(ellipse at 80% 70%, rgba(100,60,180,0.06) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(212,175,55,0.04) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 0;
    }
    /* جميع المحتوى فوق الجزيئات */

    .glass {

      border: 1px solid var(--border-gold);
      box-shadow: 0 24px 48px -12px rgba(0,0,0,0.8), 0 1px 0 rgba(212,175,55,0.15) inset;

    .logo-title {

      letter-spacing: 0.08em;
      line-height: 1;
      background: linear-gradient(135deg, #f0d060 0%, #d4af37 40%, #8b6914 70%, #d4af37 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 20px rgba(212,175,55,0.5));
      background-size: 200%;
      animation: shimmer 4s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%,100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    .crown { font-size: clamp(1.8rem,4vw,3rem); filter: drop-shadow(0 0 10px #d4af37); display:inline-block; animation: crownPulse 2.5s ease-in-out infinite; }

      clearTimeout(alertTimeout);
      const styles = {
        success: { bg: 'rgba(20,60,30,0.9)', border: '#4ade80', color: '#bbf7d0' },
        error:   { bg: 'rgba(60,15,15,0.9)', border: '#f87171', color: '#fecaca' },
        info:    { bg: 'rgba(15,25,60,0.9)', border: '#60a5fa', color: '#bfdbfe' }
      };
      const s = styles[type] || styles.info;
      const icons = { success: 'check-circle', error: 'exclamation-triangle', info: 'bolt' };
      alertBox.style.cssText = `display:block;max-width:900px;margin:0 auto 1.2rem;border-radius:16px;padding:14px 20px;font-size:0.88rem;font-weight:600;border-right:4px solid ${s.border};background:${s.bg};color:${s.color};backdrop-filter:blur(12px);`;
      alertBox.innerHTML = `<i class="fas fa-${icons[type]||'info-circle'}"></i> ${msg}`;
      alertTimeout = setTimeout(() => { alertBox.style.display = 'none'; }, 6000);
    }

    function updateUidDisplay() {
      uidListContainer.innerHTML = '';
      uidsList.forEach(uid => {
        const b = document.createElement('span');
        b.className = 'uid-badge';
        b.innerHTML = `${uid} <i class="fas fa-times" style="cursor:pointer;color:#f87171;margin-right:4px;" data-uid="${uid}"></i>`;
        uidListContainer.appendChild(b);
      });
      document.querySelectorAll('[data-uid]').forEach(el => {
        el.addEventListener('click', () => { uidsList.delete(el.getAttribute('data-uid')); updateUidDisplay(); });
      });
      uidCountMessage.textContent = `${uidsList.size} / ${MAX_UIDS} لاعبين`;
    }

    function addUid(val) {
      const uid = val.trim();
      if (!uid) return showAlert('أدخل UID اللاعب', 'error');
      if (!/^\d+$/.test(uid)) return showAlert('يجب أن يكون UID أرقاماً فقط', 'error');
      if (uidsList.size >= MAX_UIDS) return showAlert('الحد الأقصى 5 لاعبين', 'error');
      if (uidsList.has(uid)) return showAlert('اللاعب مضاف مسبقاً', 'info');
      uidsList.add(uid);
      updateUidDisplay();
      uidInput.value = '';
      uidInput.focus();
    }

    async function executeEmote(emoteId) {
      if (isExecuting) return;
      const teamCode = teamCodeInput.value.trim();
      const uids = Array.from(uidsList);
      if (!teamCode || teamCode.length < 4) return showAlert('أدخل كود الغرفة (4 أحرف على الأقل)', 'error');
      if (uids.length === 0) return showAlert('أضف لاعباً واحداً على الأقل', 'error');
      isExecuting = true;
      emoteGridEl.style.opacity = '0.5';
      emoteGridEl.style.pointerEvents = 'none';
      showAlert(`⏳ تنفيذ الإيموت ${emoteId} ...`, 'info');
      try {
        const params = new URLSearchParams();
        params.append('team', teamCode);
        uids.forEach(uid => params.append('uid', uid));
        params.append('emote', emoteId);
        const res = await fetch(`${API_BASE}/emote?${params}`, {
          method: 'GET', mode: 'cors', credentials: 'omit', cache: 'no-cache'
        });
        const data = await res.json().catch(() => ({}));
        if (res.ok && data.success) {
          showAlert('✅ تم الترقيص بنجاح!', 'success');
        } else {
          throw new Error(data.error || `HTTP ${res.status}`);
        }
      } catch (err) {
        showAlert(`❌ فشل: ${err.message}`, 'error');
      } finally {
        isExecuting = false;
        emoteGridEl.style.opacity = '';
        emoteGridEl.style.pointerEvents = '';
      }
    }

    function renderEmotes(filter = '') {
      const filtered = emoteIds.filter(id => id.includes(filter));
      emoteCounter.textContent = `${filtered.length} إيموت`;
      emoteGridEl.innerHTML = '';
      const BATCH = 40;
      let idx = 0;
      function renderBatch() {
        const end = Math.min(idx + BATCH, filtered.length);
        for (; idx < end; idx++) {
          const id = filtered[idx];
          const div = document.createElement('div');
          div.className = 'emote-item';
          const img = new Image();
          img.alt = id;
          img.loading = 'lazy';
          img.decoding = 'async';
          // ✅ تمت إضافة هذا السطر لحل مشكلة عدم ظهور الصور
          img.crossOrigin = 'anonymous';
          img.src = CDN_BASE + id + '.png';
          img.onerror = function() {
            const fb = document.createElement('div');
            fb.className = 'fallback-icon';
            fb.innerHTML = '<i class="fas fa-image"></i>';
            if (this.parentNode) this.parentNode.replaceChild(fb, this);
          };
          const label = document.createElement('div');
          label.className = 'emote-id-label';
          label.textContent = id.slice(-5);
          div.addEventListener('click', () => executeEmote(id));
          div.appendChild(img);
          div.appendChild(label);
          emoteGridEl.appendChild(div);
        }
        if (idx < filtered.length) requestAnimationFrame(renderBatch);
      }
      requestAnimationFrame(renderBatch);
    }

    async function sendSquad5() {
      const uid = squadUidInput.value.trim();
      if (!uid || !/^\d+$/.test(uid)) return showAlert('UID يجب أن يكون أرقاماً فقط', 'error');
      sendSquadBtn.disabled = true;
      sendSquadBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
      try {
        const res = await fetch(`${API_BASE}/squad5?uid=${encodeURIComponent(uid)}`, {
          mode: 'cors', credentials: 'omit', cache: 'no-cache'
        });
        const data = await res.json().catch(() => ({}));
        if (res.ok && data.success) {
          showAlert(`✅ تم إرسال سكواد 5 إلى ${uid}`, 'success');
        } else {
          throw new Error(data.error || `HTTP ${res.status}`);
        }
      } catch (err) {
        showAlert(`❌ ${err.message}`, 'error');
      } finally {
        sendSquadBtn.disabled = false;
        sendSquadBtn.innerHTML = '<i class="fas fa-paper-plane"></i>';
      }
    }

    async function checkApiStatus() {
      try {
        const ctrl = new AbortController();
        const t = setTimeout(() => ctrl.abort(), 4000);
        const res = await fetch(`${API_BASE}/ping`, { method: 'GET', mode: 'cors', credentials: 'omit', cache: 'no-cache', signal: ctrl.signal });
        clearTimeout(t);
        apiStatusSpan.textContent = '● متصل';
        apiStatusSpan.className = 'status-online';
      } catch {
        apiStatusSpan.textContent = '● غير متصل';
        apiStatusSpan.className = 'status-offline';
      }
    }

    let searchTimer;
    emoteSearch.addEventListener('input', (e) => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => renderEmotes(e.target.value.trim()), 200);
    });
    addUidBtn.addEventListener('click', () => addUid(uidInput.value));
    uidInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addUid(uidInput.value); });
    sendSquadBtn.addEventListener('click', sendSquad5);

    updateUidDisplay();
    renderEmotes();
    checkApiStatus();
    setInterval(checkApiStatus, 30000);
  })();
</script>
</body>
</html>
